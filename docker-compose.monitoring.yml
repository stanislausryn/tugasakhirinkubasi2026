version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: moderno_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - proxy_net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  grafana:
    image: grafana/grafana:latest
    container_name: moderno_grafana
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - proxy_net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

volumes:
  grafana_data:

networks:
  proxy_net:
    external: true
