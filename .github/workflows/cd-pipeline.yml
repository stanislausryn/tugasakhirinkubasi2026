name: CD Pipeline MODERNO

on:
  push:
    branches:
      - development
      - main

jobs:
  build-and-test:
    name: Build & Test (CI)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install & Build Server
        run: |
          cd server && npm ci && npm run build
          
      - name: Install & Build Client
        run: |
          cd client && npm ci && npm run build

  deploy-staging:
    name: Deploy to Staging
    needs: build-and-test
    if: github.ref == 'refs/heads/development'
    environment: 
      name: staging
      url: ${{ vars.STAGING_URL }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Deploy via SSH (Staging)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            git config --global --add safe.directory $(pwd)/tugasakhirinkubasi2026
            cd tugasakhirinkubasi2026/
            git pull origin development
            
            # Deploy Staging
            docker-compose -f docker-compose.prod.yml up -d --build
            
            # Health Check dari VPS
            sleep 15
            curl -f http://localhost:3000 || exit 1


  deploy-production:
    name: Deploy to Production
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    environment: 
      name: production
      url: ${{ vars.PROD_URL }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Deploy via SSH (Rolling Update)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            git config --global --add safe.directory $(pwd)/tugasakhirinkubasi2026
            cd tugasakhirinkubasi2026/
            git pull origin main
            
            # Deployment: Rolling Update
            docker-compose -f docker-compose.prod.yml build
            docker-compose -f docker-compose.prod.yml up -d --no-deps server
            docker-compose -f docker-compose.prod.yml up -d --no-deps client
            
            # Health Check dari VPS
            sleep 15
            curl -f http://localhost:3000 || exit 1
